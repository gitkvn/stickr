<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="peel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#e9e0ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main sticker body -->
  <rect x="2" y="2" width="24" height="24" rx="5" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Peel corner -->
  <path d="M26 2 L26 10 Q26 2 18 2 Z" fill="url(#peel)" opacity="0.9"/>
  <!-- Letter S -->
  <text x="14" y="20" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-weight="bold" font-size="18">S</text>
</svg>
